name: Maintenance deps weekly

on:
  schedule:
    # Every Monday at 00:00 UTC (07:00 WIB)
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Maintenance deps weekly validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Update dependencies
        run: cargo update --verbose

      - name: Enforce dependency-only diff
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dependencies are already up to date"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Auto-update may only modify Cargo.lock"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --locked

      - name: Install cargo-deny
        if: steps.changes.outputs.changed == 'true'
        run: cargo install cargo-deny --locked

      - name: Check dependency policies
        if: steps.changes.outputs.changed == 'true'
        run: cargo deny check all

      - name: Run repository policy check
        if: steps.changes.outputs.changed == 'true'
        run: python3 scripts/check-policy.py

      - name: Verify release build
        if: steps.changes.outputs.changed == 'true'
        run: cargo build --release --locked

      - name: Upload validated Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: validated-cargo-lock
          path: Cargo.lock
          if-no-files-found: error

  commit:
    name: Maintenance deps weekly commit
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download validated Cargo.lock
        uses: actions/download-artifact@v6
        with:
          name: validated-cargo-lock
          path: .auto-update

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          cp .auto-update/Cargo.lock Cargo.lock

          if git diff --quiet; then
            echo "Validated lockfile is already current"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Commit job may only modify Cargo.lock"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore(deps): maintenance deps weekly"
          git push origin main
