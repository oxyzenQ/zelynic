name: Docs CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown Lint
        run: |
          # Basic check for now
          grep -r "." **/*.md > /dev/null
