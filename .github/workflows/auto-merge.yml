name: Auto-merge Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  contents: write
  actions: write

jobs:
  auto-approve-and-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if auto-merge is allowed
        id: check
        run: |
          # Only auto-merge minor and patch updates
          # Major updates always require manual review
          if [ "${{ steps.metadata.outputs.update-type }}" = "version-update:semver-major" ]; then
            echo "auto=false" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-merge: major version update requires manual review"
          else
            echo "auto=true" >> "$GITHUB_OUTPUT"
            echo "Auto-merge: ${{ steps.metadata.outputs.update-type }}"
          fi

      - name: Wait for CI checks to pass
        if: steps.check.outputs.auto == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const maxWait = 30 * 60 * 1000; // 30 minutes max
            const pollInterval = 30 * 1000;   // check every 30s
            const start = Date.now();

            while (Date.now() - start < maxWait) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });

              const allChecks = checks.data.check_runs;
              if (allChecks.length === 0) {
                console.log('No checks found yet, waiting...');
                await new Promise(r => setTimeout(r, pollInterval));
                continue;
              }

              const completed = allChecks.every(c => c.status === 'completed');
              if (!completed) {
                console.log('Checks still running, waiting...');
                await new Promise(r => setTimeout(r, pollInterval));
                continue;
              }

              const passed = allChecks.every(c => c.conclusion === 'success');
              if (!passed) {
                console.log('CI checks failed, skipping auto-merge');
                core.setFailed('CI checks did not pass');
                return;
              }

              console.log('All CI checks passed!');
              return;
            }

            console.log('Timed out waiting for CI');
            core.setFailed('Timed out waiting for CI checks');

      - name: Auto-merge (squash)
        if: steps.check.outputs.auto == 'true'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
