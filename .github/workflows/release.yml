name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Build Release Binaries
  # ===========================================================================
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: x86_64
            pkg_suffix: x86_64-linux
          - target: x86_64-unknown-linux-musl
            suffix: x86_64-musl
            pkg_suffix: x86_64-linux-musl
          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
            pkg_suffix: aarch64-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} --locked

      - name: Prepare release artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist

          # Create package directory structure
          PKG_NAME="oxy-v${VERSION}-${{ matrix.pkg_suffix }}"
          mkdir -p "dist/${PKG_NAME}/man"

          # Copy binary
          cp target/${{ matrix.target }}/release/oxy "dist/${PKG_NAME}/oxy"

          # Copy documentation
          cp README.md LICENSE "dist/${PKG_NAME}/"

          # Generate man page
          ./target/${{ matrix.target }}/release/oxy man > "dist/${PKG_NAME}/man/oxy.1" 2>/dev/null || true
          if [ -f "dist/${PKG_NAME}/man/oxy.1" ]; then
            gzip -f "dist/${PKG_NAME}/man/oxy.1"
          fi

          # Create tar.gz archive
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"

          # Cleanup
          rm -rf "${PKG_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oxy-linux-${{ matrix.suffix }}
          path: dist/*

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: oxy-linux-*

      - name: Flatten artifact structure
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
