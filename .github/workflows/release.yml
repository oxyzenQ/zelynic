name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Build Release Binary (x86_64 Linux only)
  # ===========================================================================
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-release-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --locked

      - name: Prepare release artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_NAME="oxy-v${VERSION}-x86_64-linux"
          mkdir -p "dist/${PKG_NAME}/man"

          # Copy binary
          cp target/x86_64-unknown-linux-gnu/release/oxy "dist/${PKG_NAME}/oxy"

          # Copy documentation
          cp README.md LICENSE "dist/${PKG_NAME}/"

          # Generate man page
          chmod +x "dist/${PKG_NAME}/oxy"
          ./dist/${PKG_NAME}/oxy man > "dist/${PKG_NAME}/man/oxy.1" 2>/dev/null || true
          if [ -f "dist/${PKG_NAME}/man/oxy.1" ]; then
            gzip -f "dist/${PKG_NAME}/man/oxy.1"
          fi

          # Create tar.gz archive
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

          # Generate SHA256 checksum
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"

          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

          # Cleanup extracted directory
          rm -rf "${PKG_NAME}"

          echo ""
          echo "=== Release artifacts ==="
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  # ===========================================================================
  # Create GitHub Release with Changelog
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Generate changelog from git history
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"

          # Find the previous tag (sorted by version)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)

          if [ -n "${PREV_TAG}" ]; then
            echo "Generating changelog: ${PREV_TAG}..${CURRENT_TAG}"
            COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "No previous tag found. Generating changelog from first commit."
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Categorize commits
          FEATURES=$(echo "${COMMITS}" | grep -iE "^- (feat|add)" || true)
          FIXES=$(echo "${COMMITS}" | grep -iE "^- (fix|bug)" || true)
          CHORES=$(echo "${COMMITS}" | grep -iE "^- (chore|ci|docs|refactor|perf|cleanup)" || true)
          OTHER=$(echo "${COMMITS}" | grep -viE "^- (feat|add|fix|bug|chore|ci|docs|refactor|perf|cleanup)" || true)

          # Build changelog body using a file directly (avoids newline/escape issues)
          CHANGELOG_FILE="/tmp/changelog.md"
          echo "## What's Changed" > "${CHANGELOG_FILE}"
          echo "" >> "${CHANGELOG_FILE}"

          if [ -n "${FEATURES}" ]; then
            echo "### Features" >> "${CHANGELOG_FILE}"
            echo "${FEATURES}" >> "${CHANGELOG_FILE}"
            echo "" >> "${CHANGELOG_FILE}"
          fi

          if [ -n "${FIXES}" ]; then
            echo "### Bug Fixes" >> "${CHANGELOG_FILE}"
            echo "${FIXES}" >> "${CHANGELOG_FILE}"
            echo "" >> "${CHANGELOG_FILE}"
          fi

          if [ -n "${CHORES}" ]; then
            echo "### Maintenance" >> "${CHANGELOG_FILE}"
            echo "${CHORES}" >> "${CHANGELOG_FILE}"
            echo "" >> "${CHANGELOG_FILE}"
          fi

          if [ -n "${OTHER}" ]; then
            echo "### Other Changes" >> "${CHANGELOG_FILE}"
            echo "${OTHER}" >> "${CHANGELOG_FILE}"
            echo "" >> "${CHANGELOG_FILE}"
          fi

          echo "---" >> "${CHANGELOG_FILE}"
          FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD | cut -c1-7)
          echo "**Full Changelog**: https://github.com/oxyzenq/oxy/compare/${PREV_TAG:-${FIRST_COMMIT}}...${CURRENT_TAG}" >> "${CHANGELOG_FILE}"

          # Use delimiter-based multiline output for GITHUB_OUTPUT
          {
            echo "changelog<<CHANGELOG_EOF"
            cat "${CHANGELOG_FILE}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Generated Changelog ==="
          cat "${CHANGELOG_FILE}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
