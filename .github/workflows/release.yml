name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Build Release Binary (x86_64 Linux only)
  # ===========================================================================
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-release-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --locked

      - name: Prepare release artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_NAME="oxy-v${VERSION}-x86_64-linux"
          mkdir -p "dist/${PKG_NAME}/man"

          # Copy binary
          cp target/x86_64-unknown-linux-gnu/release/oxy "dist/${PKG_NAME}/oxy"

          # Copy documentation
          cp README.md LICENSE "dist/${PKG_NAME}/"

          # Generate man page
          chmod +x "dist/${PKG_NAME}/oxy"
          ./dist/${PKG_NAME}/oxy man > "dist/${PKG_NAME}/man/oxy.1" 2>/dev/null || true
          if [ -f "dist/${PKG_NAME}/man/oxy.1" ]; then
            gzip -f "dist/${PKG_NAME}/man/oxy.1"
          fi

          # Create tar.gz archive
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

          # Generate SHA256 checksum
          sha256sum "${PKG_NAME}.tar.gz" > "${PKG_NAME}.tar.gz.sha256"

          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_ENV"

          # Cleanup extracted directory
          rm -rf "${PKG_NAME}"

          echo ""
          echo "=== Release artifacts ==="
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  # ===========================================================================
  # Create GitHub Release with Changelog
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Generate release body
        id: release_body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PKG_NAME="oxy-v${VERSION}-x86_64-linux"

          # Find previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)

          # Build changelog (last 20 non-trivial commits only)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="$(git rev-list --max-parents=0 HEAD)...${CURRENT_TAG}"
          fi

          # Get commit count (excluding trivial commits)
          COMMIT_COUNT=$(git log "${RANGE}" --no-merges --oneline \
            --invert-grep --grep='^fmt$' --grep='^check next' \
            | wc -l | tr -d ' ')

          RELEASE_FILE="/tmp/release_body.md"

          # --- Header: description only (title is set via 'name' field, no duplication) ---
          echo "Easy userspace bandwidth manager for Linux — x86_64" > "${RELEASE_FILE}"
          echo "" >> "${RELEASE_FILE}"

          # --- Install ---
          echo '### Install' >> "${RELEASE_FILE}"
          echo '```bash' >> "${RELEASE_FILE}"
          echo "tar -xzf ${PKG_NAME}.tar.gz" >> "${RELEASE_FILE}"
          echo "sudo install -Dm755 ${PKG_NAME}/oxy /usr/local/bin/oxy" >> "${RELEASE_FILE}"
          echo '```' >> "${RELEASE_FILE}"
          echo "" >> "${RELEASE_FILE}"

          # --- Verify ---
          echo '### Verify' >> "${RELEASE_FILE}"
          echo '```bash' >> "${RELEASE_FILE}"
          echo "sha256sum -c ${PKG_NAME}.tar.gz.sha256" >> "${RELEASE_FILE}"
          echo '```' >> "${RELEASE_FILE}"
          echo "" >> "${RELEASE_FILE}"

          # --- Quick Start ---
          echo '### Quick Start' >> "${RELEASE_FILE}"
          echo '```bash' >> "${RELEASE_FILE}"
          echo 'oxy list --live                             # Real-time TUI dashboard' >> "${RELEASE_FILE}"
          echo 'sudo oxy strict -d 1mb brave                # Limit bandwidth' >> "${RELEASE_FILE}"
          echo 'sudo oxy strict --preset gaming discord      # Use preset' >> "${RELEASE_FILE}"
          echo 'oxy --help-all                              # All commands' >> "${RELEASE_FILE}"
          echo '```' >> "${RELEASE_FILE}"
          echo "" >> "${RELEASE_FILE}"

          # --- Changelog summary (compact) ---
          echo "---" >> "${RELEASE_FILE}"
          echo "**${COMMIT_COUNT} changes** since ${PREV_TAG:-first commit}  |  [Full Changelog](https://github.com/oxyzenq/oxy/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | cut -c1-7)}...${CURRENT_TAG})" >> "${RELEASE_FILE}"

          # Feed to GITHUB_OUTPUT
          {
            echo "release_body<<BODY_EOF"
            cat "${RELEASE_FILE}"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Release Body ==="
          cat "${RELEASE_FILE}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "oxy v${{ github.ref_name }}"
          files: dist/*
          body: ${{ steps.release_body.outputs.release_body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
