name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY: "oxy"
  TARGET: "x86_64-unknown-linux-gnu"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="oxy-v${VERSION}-x86_64-linux"
          mkdir -p "dist/${PKG}"

          cp target/release/${BINARY} "dist/${PKG}/${BINARY}"
          cp README.md LICENSE "dist/${PKG}/"

          # Generate man page
          ./target/release/${BINARY} man > "dist/${PKG}/oxy.1" 2>/dev/null || true
          if [ -s "dist/${PKG}/oxy.1" ]; then
            gzip -f "dist/${PKG}/oxy.1"
          fi

          # Create tar.gz
          cd dist
          tar -czf "${PKG}.tar.gz" "${PKG}"

          # SHA256 checksum
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

          echo "=== Artifacts ==="
          ls -lh "${PKG}.tar.gz" "${PKG}.tar.gz.sha256"
          echo ""
          echo "=== SHA256 ==="
          cat "${PKG}.tar.gz.sha256"

      - name: Extract version and changelog
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract changelog for this version
          if [ -f CHANGELOG.md ]; then
            # Get content between ## [X.Y.Z] and next ## or EOF
            BODY=$(sed -n "/^## \[${VERSION}\]/,/^## /p" CHANGELOG.md | sed '1d;$d')
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "oxy v${{ steps.meta.outputs.version }}"
          body: |
            ## oxy v${{ steps.meta.outputs.version }}

            **Easy userspace bandwidth manager for Linux** — x86_64

            ### Downloads

            | File | Description |
            |------|-------------|
            | `oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz` | Binary + docs |
            | `oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz.sha256` | Checksum |

            ### Install

            ```bash
            tar -xzf oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz
            sudo install -Dm755 oxy-v${{ steps.meta.outputs.version }}-x86_64-linux/oxy /usr/local/bin/oxy
            ```

            ### Verify

            ```bash
            sha256sum -c oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz.sha256
            ```

            ### Quick Start

            ```bash
            oxy list --live                   # Real-time TUI dashboard
            sudo oxy strict -d 1mb brave       # Limit bandwidth
            sudo oxy strict --preset gaming discord  # Use preset
            oxy --help-all                    # All commands
            ```

            ---

            ${{ steps.meta.outputs.changelog }}
          files: |
            dist/oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz
            dist/oxy-v${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
